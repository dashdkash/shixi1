[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# 本地开发默认值，Docker 部署时会被 env.py 中的环境变量覆盖
sqlalchemy.url = postgresql://lujie:lujie@localhost:5432/lujie

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S