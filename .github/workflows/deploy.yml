# ═══════════════════════════════════════════════════════
# 部署工作流 — 镜像构建成功后触发
# 将 docker-compose.server.yml 推送到服务器并重启服务
# ═══════════════════════════════════════════════════════

name: Deploy

on:
  workflow_run:
    workflows: ["Build Frontend Image", "Build Backend Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 推送 docker-compose.server.yml 到服务器
      - name: 推送 compose 文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.server.yml"
          target: "/opt/rsod-web-platform/"

      # SSH 登录服务器执行部署
      - name: 服务器部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/rsod-web-platform
            docker compose -f docker-compose.server.yml pull
            docker compose -f docker-compose.server.yml up -d
            docker image prune -f
